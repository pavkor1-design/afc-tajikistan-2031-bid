<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1">
<title>Слайд 5 — Вариант 2: Турнирная сетка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --midnight: #050E1D;
    --navy: #0A1830;
    --gold: #D7A63D;
    --warm-gold: #E8BF5A;
    --light-gold: #F2D98A;
    --ivory: #F6F4EF;
    --white: #FFFFFF;
  }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--midnight);
  }

  .slide {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background:
      linear-gradient(rgba(5,14,29,0.7), rgba(5,14,29,0.85)),
      url('img/stadium-river-night.jpg') center/cover no-repeat;
  }

  /* Subtle grid pattern */
  .slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(215,166,61,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(215,166,61,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 1;
  }

  /* Cinematic letterbox bars */
  .letterbox-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 80px;
    background: var(--midnight);
    z-index: 15;
  }

  .letterbox-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: var(--midnight);
    z-index: 15;
  }

  /* AFC Logo */
  .afc-logo {
    position: absolute;
    top: 100px;
    left: 80px;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 16px;
    animation: fadeIn 1s ease 0.5s both;
  }

  .afc-badge {
    width: 56px;
    height: 56px;
    border: 2px solid var(--gold);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(5,14,29,0.8);
    backdrop-filter: blur(8px);
  }

  .afc-badge svg {
    width: 30px;
    height: 30px;
    fill: var(--gold);
  }

  .afc-text {
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 15px;
    color: var(--ivory);
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1.4;
  }

  .afc-text .year {
    color: var(--gold);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 5px;
    display: block;
  }

  /* Flag ribbon */
  .flag-ribbon {
    position: absolute;
    top: 100px;
    right: 80px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    width: 8px;
    height: 120px;
    border-radius: 4px;
    overflow: hidden;
    animation: fadeIn 1s ease 0.7s both;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .flag-ribbon div { flex: 1; }
  .fr-red { background: #CC0000; }
  .fr-white { background: #FFFFFF; }
  .fr-green { background: #006600; }

  /* Title — top center */
  .title-block {
    position: absolute;
    top: 100px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 10;
    animation: fadeSlideUp 0.8s ease 0.8s both;
  }

  .tag {
    display: none !important;
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(215,166,61,0.12);
    border: 1px solid rgba(215,166,61,0.25);
    padding: 8px 20px;
    border-radius: 4px;
    margin-bottom: 16px;
  }

  .slide-title {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 44px;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 4px;
    line-height: 1.1;
  }

  .divider-center {
    width: 80px;
    height: 3px;
    background: var(--gold);
    margin: 28px auto 0;
    animation: growWidth 0.6s ease 1.2s both;
  }

  @keyframes growWidth {
    from { width: 0; }
    to { width: 80px; }
  }

  /* Tournament bracket — central SVG infographic */
  .bracket-area {
    position: absolute;
    top: 230px;
    left: 50%;
    transform: translateX(-50%);
    width: 1200px;
    height: 480px;
    z-index: 10;
    animation: fadeIn 1s ease 1.2s both;
  }

  .bracket-svg {
    width: 100%;
    height: 100%;
  }

  /* Stadium cards — bottom */
  .stadiums-row {
    position: absolute;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 40px;
    z-index: 10;
  }

  .stadium-card {
    width: 420px;
    background: rgba(10,24,48,0.6);
    border: 1px solid rgba(215,166,61,0.12);
    border-radius: 10px;
    padding: 24px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(8px);
    animation: fadeSlideUp 0.7s ease both;
  }

  .stadium-card:nth-child(1) { animation-delay: 1.8s; }
  .stadium-card:nth-child(2) { animation-delay: 2s; }

  .stadium-icon {
    width: 48px;
    height: 48px;
    min-width: 48px;
    border: 1px solid rgba(215,166,61,0.3);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(215,166,61,0.08);
  }

  .stadium-icon svg {
    width: 26px;
    height: 26px;
    fill: var(--gold);
  }

  .stadium-info h3 {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 20px;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .stadium-info .stadium-meta {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 13px;
    color: rgba(246,244,239,0.6);
    line-height: 1.5;
  }

  .stadium-info .stadium-meta span {
    color: var(--warm-gold);
    font-weight: 500;
  }

  /* Key message */
  .key-message {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 15px;
    color: rgba(246,244,239,0.5);
    max-width: 700px;
    line-height: 1.6;
    z-index: 10;
    animation: fadeIn 1s ease 2.2s both;
  }

  /* Bottom info strip */
  .bottom-strip {
    position: absolute;
    bottom: 90px;
    right: 80px;
    z-index: 20;
    text-align: right;
    animation: fadeIn 1s ease 2.4s both;
  }

  .fft-name {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 12px;
    color: rgba(246,244,239,0.45);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .date {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 13px;
    color: rgba(215,166,61,0.5);
    letter-spacing: 3px;
  }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="slide">

  <!-- Cinematic letterbox -->
  <div class="letterbox-top"></div>
  <div class="letterbox-bottom"></div>

  <!-- AFC Logo -->
  <div class="afc-logo">
    <div class="afc-badge">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
    </div>
    <div class="afc-text">
      AFC Asian Cup
      <span class="year">2031</span>
    </div>
  </div>

  <!-- Flag ribbon -->
  <div class="flag-ribbon">
    <div class="fr-red"></div>
    <div class="fr-white"></div>
    <div class="fr-green"></div>
  </div>

  <!-- Title at top -->
  <div class="title-block">
    <div class="tag">Суть заявки</div>
    <h1 class="slide-title">Наша заявка: суть и масштаб</h1>
    <div class="divider-center"></div>
  </div>

  <!-- Tournament bracket SVG infographic -->
  <div class="bracket-area">
    <svg class="bracket-svg" viewBox="0 0 1200 480" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Group X box -->
      <rect x="40" y="30" width="260" height="200" rx="12" fill="rgba(10,24,48,0.7)" stroke="rgba(215,166,61,0.2)" stroke-width="1.5"/>
      <text x="170" y="70" text-anchor="middle" font-family="Oswald" font-weight="700" font-size="22" fill="#D7A63D" letter-spacing="3">ГРУППА X</text>
      <line x1="90" y1="85" x2="250" y2="85" stroke="rgba(215,166,61,0.2)" stroke-width="1"/>
      <text x="170" y="115" text-anchor="middle" font-family="Inter" font-weight="400" font-size="15" fill="#F6F4EF">Команда A1</text>
      <text x="170" y="143" text-anchor="middle" font-family="Inter" font-weight="400" font-size="15" fill="#F6F4EF">Команда A2</text>
      <text x="170" y="171" text-anchor="middle" font-family="Inter" font-weight="400" font-size="15" fill="#F6F4EF">Команда A3</text>
      <text x="170" y="199" text-anchor="middle" font-family="Inter" font-weight="400" font-size="15" fill="#F6F4EF">Команда A4</text>
      <!-- 4 teams label -->
      <text x="170" y="255" text-anchor="middle" font-family="Inter" font-weight="300" font-size="12" fill="rgba(246,244,239,0.45)">4 команды &middot; 6 матчей</text>

      <!-- Group Y box -->
      <rect x="40" y="280" width="260" height="200" rx="12" fill="rgba(10,24,48,0.7)" stroke="rgba(215,166,61,0.2)" stroke-width="1.5"/>
      <text x="170" y="320" text-anchor="middle" font-family="Oswald" font-weight="700" font-size="22" fill="#D7A63D" letter-spacing="3">ГРУППА Y</text>
      <line x1="90" y1="335" x2="250" y2="335" stroke="rgba(215,166,61,0.2)" stroke-width="1"/>
      <text x="170" y="365" text-anchor="middle" font-family="Inter" font-weight="400" font-size="15" fill="#F6F4EF">Команда B1</text>
      <text x="170" y="393" text-anchor="middle" font-family="Inter" font-weight="400" font-size="15" fill="#F6F4EF">Команда B2</text>
      <text x="170" y="421" text-anchor="middle" font-family="Inter" font-weight="400" font-size="15" fill="#F6F4EF">Команда B3</text>
      <text x="170" y="449" text-anchor="middle" font-family="Inter" font-weight="400" font-size="15" fill="#F6F4EF">Команда B4</text>

      <!-- Connecting lines from groups -->
      <line x1="300" y1="130" x2="420" y2="130" stroke="rgba(215,166,61,0.35)" stroke-width="2" stroke-dasharray="6 4"/>
      <line x1="300" y1="380" x2="420" y2="380" stroke="rgba(215,166,61,0.35)" stroke-width="2" stroke-dasharray="6 4"/>
      <line x1="420" y1="130" x2="420" y2="380" stroke="rgba(215,166,61,0.35)" stroke-width="2" stroke-dasharray="6 4"/>
      <line x1="420" y1="240" x2="480" y2="240" stroke="rgba(215,166,61,0.35)" stroke-width="2" stroke-dasharray="6 4"/>

      <!-- Central hub — Душанбе -->
      <rect x="480" y="160" width="240" height="160" rx="16" fill="rgba(10,24,48,0.8)" stroke="#D7A63D" stroke-width="2"/>
      <text x="600" y="210" text-anchor="middle" font-family="Oswald" font-weight="700" font-size="28" fill="#FFFFFF" letter-spacing="2">ДУШАНБЕ</text>
      <line x1="530" y1="225" x2="670" y2="225" stroke="rgba(215,166,61,0.3)" stroke-width="1"/>
      <text x="600" y="255" text-anchor="middle" font-family="Inter" font-weight="400" font-size="15" fill="#E8BF5A">12 матчей</text>
      <text x="600" y="280" text-anchor="middle" font-family="Inter" font-weight="300" font-size="13" fill="rgba(246,244,239,0.6)">Групповой этап</text>
      <text x="600" y="303" text-anchor="middle" font-family="Inter" font-weight="300" font-size="13" fill="rgba(246,244,239,0.6)">2 стадиона</text>

      <!-- Right side — stats -->
      <line x1="720" y1="240" x2="800" y2="240" stroke="rgba(215,166,61,0.35)" stroke-width="2" stroke-dasharray="6 4"/>

      <!-- Stat cards right -->
      <rect x="800" y="50" width="360" height="110" rx="10" fill="rgba(10,24,48,0.6)" stroke="rgba(215,166,61,0.15)" stroke-width="1"/>
      <text x="860" y="105" font-family="Oswald" font-weight="700" font-size="56" fill="#D7A63D">2</text>
      <text x="910" y="90" font-family="Oswald" font-weight="500" font-size="20" fill="#FFFFFF" letter-spacing="2">ГРУППЫ</text>
      <text x="910" y="115" font-family="Inter" font-weight="300" font-size="13" fill="rgba(246,244,239,0.5)">Группа X и Группа Y</text>

      <line x1="800" y1="185" x2="800" y2="240" stroke="rgba(215,166,61,0.2)" stroke-width="1" stroke-dasharray="4 3"/>

      <rect x="800" y="185" width="360" height="110" rx="10" fill="rgba(10,24,48,0.6)" stroke="rgba(215,166,61,0.15)" stroke-width="1"/>
      <text x="860" y="240" font-family="Oswald" font-weight="700" font-size="56" fill="#D7A63D">8</text>
      <text x="910" y="225" font-family="Oswald" font-weight="500" font-size="20" fill="#FFFFFF" letter-spacing="2">КОМАНД</text>
      <text x="910" y="250" font-family="Inter" font-weight="300" font-size="13" fill="rgba(246,244,239,0.5)">Участники турнира в Душанбе</text>

      <line x1="800" y1="320" x2="800" y2="375" stroke="rgba(215,166,61,0.2)" stroke-width="1" stroke-dasharray="4 3"/>

      <rect x="800" y="320" width="360" height="110" rx="10" fill="rgba(10,24,48,0.6)" stroke="rgba(215,166,61,0.15)" stroke-width="1"/>
      <text x="860" y="378" font-family="Oswald" font-weight="700" font-size="56" fill="#D7A63D">12</text>
      <text x="920" y="360" font-family="Oswald" font-weight="500" font-size="20" fill="#FFFFFF" letter-spacing="2">МАТЧЕЙ</text>
      <text x="920" y="385" font-family="Inter" font-weight="300" font-size="13" fill="rgba(246,244,239,0.5)">Групповой этап в Душанбе</text>
    </svg>
  </div>

  <!-- Stadium cards -->
  <div class="stadiums-row">
    <div class="stadium-card">
      <div class="stadium-icon">
        <svg viewBox="0 0 24 24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>
      </div>
      <div class="stadium-info">
        <h3>«Душанбе Арена»</h3>
        <div class="stadium-meta">
          <span>40 000</span> мест &middot; <span>Новое строительство</span>
        </div>
      </div>
    </div>
    <div class="stadium-card">
      <div class="stadium-icon">
        <svg viewBox="0 0 24 24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>
      </div>
      <div class="stadium-info">
        <h3>«Гиссар»</h3>
        <div class="stadium-meta">
          <span>25 000</span> мест &middot; <span>Реконструкция</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom info -->
  <div class="bottom-strip">
    <div class="fft-name">Федерация футбола Таджикистана</div>
    <div class="date">Март 2026 &middot; Душанбе</div>
  </div>

</div>
</body>
</html>
