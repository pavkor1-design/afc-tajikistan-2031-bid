<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1">
<title>Слайд 1 — Вариант 2: Cinematic Widescreen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --midnight: #050E1D;
    --navy: #0A1830;
    --gold: #D7A63D;
    --warm-gold: #E8BF5A;
    --light-gold: #F2D98A;
    --ivory: #F6F4EF;
    --white: #FFFFFF;
  }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--midnight);
  }

  .slide {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
  }

  /* Full-bleed background */
  .bg-image {
    position: absolute;
    inset: 0;
    background: url('img/stadium-night-aerial.jpg') center 40% / cover no-repeat;
    animation: cinematicDrift 25s ease-in-out infinite alternate;
  }

  @keyframes cinematicDrift {
    from { transform: scale(1.02) translateY(0); }
    to { transform: scale(1.08) translateY(-15px); }
  }

  /* Cinematic letterbox bars */
  .letterbox-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 80px;
    background: var(--midnight);
    z-index: 15;
  }

  .letterbox-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: var(--midnight);
    z-index: 15;
  }

  /* Heavy bottom gradient for text readability */
  .gradient-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 700px;
    background: linear-gradient(0deg,
      rgba(5,14,29,0.98) 0%,
      rgba(5,14,29,0.92) 15%,
      rgba(5,14,29,0.7) 40%,
      rgba(5,14,29,0.3) 65%,
      transparent 100%);
    z-index: 3;
  }

  /* Subtle side vignettes */
  .vignette {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(5,14,29,0.5) 0%, transparent 25%),
      linear-gradient(-90deg, rgba(5,14,29,0.5) 0%, transparent 25%);
    z-index: 3;
  }
  /* Flag ribbon — right edge */
  .flag-ribbon {
    position: absolute;
    top: 100px;
    right: 80px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 0;
    width: 8px;
    height: 120px;
    border-radius: 4px;
    overflow: hidden;
    animation: fadeIn 1s ease 0.7s both;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .flag-ribbon div { flex: 1; }
  .fr-red { background: #CC0000; }
  .fr-white { background: #FFFFFF; }
  .fr-green { background: #006600; }

  /* Main content — bottom aligned */
  .content {
    position: absolute;
    bottom: 120px;
    left: 80px;
    right: 80px;
    z-index: 10;
  }

  .tag {
    display: inline-block !important;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--warm-gold);
    background: rgba(215,166,61,0.15);
    border: 1px solid rgba(215,166,61,0.3);
    padding: 8px 24px;
    border-radius: 4px;
    margin-bottom: 24px;
    animation: fadeSlideUp 0.7s ease 1s both;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }

  .main-title {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 96px;
    line-height: 1.0;
    color: var(--white);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    animation: fadeSlideUp 0.8s ease 1.2s both;
    text-shadow: 0 4px 40px rgba(0,0,0,0.6);
  }

  .main-title .highlight {
    color: var(--warm-gold);
    font-weight: 500;
    font-size: 72px;
    display: block;
    margin-top: 4px;
    letter-spacing: 8px;
  }

  .divider {
    width: 80px;
    height: 3px;
    background: var(--gold);
    margin: 24px 0;
    animation: growWidth 0.6s ease 1.6s both;
  }

  @keyframes growWidth {
    from { width: 0; }
    to { width: 80px; }
  }

  .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 22px;
    line-height: 1.6;
    color: rgba(246,244,239,0.85);
    max-width: 800px;
    animation: fadeSlideUp 0.7s ease 1.8s both;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
  }

  /* Bottom info strip */
  .bottom-strip {
    position: absolute;
    bottom: 90px;
    right: 80px;
    z-index: 20;
    text-align: right;
    animation: fadeIn 1s ease 2.2s both;
  }

  .fft-name {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 12px;
    color: rgba(246,244,239,0.45);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .date {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 13px;
    color: rgba(215,166,61,0.5);
    letter-spacing: 3px;
  }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="slide">
  <!-- Background -->
  <div class="bg-image"></div>
  <div class="gradient-bottom"></div>
  <div class="vignette"></div>

  <!-- Cinematic letterbox -->
  <div class="letterbox-top"></div>
  <div class="letterbox-bottom"></div>

  <!-- AFC Logo removed per client request -->

  <!-- Flag ribbon -->
  <div class="flag-ribbon">
    <div class="fr-red"></div>
    <div class="fr-white"></div>
    <div class="fr-green"></div>
  </div>

  <!-- Main Content -->
  <div class="content">
    <div class="tag">Официальная заявка</div>
    <h1 class="main-title">
      ТАДЖИКИСТАН
      <span class="highlight">AFC 2031</span>
    </h1>
    <div class="divider"></div>
    <p class="subtitle">
      Официальная заявка Федерации футбола Таджикистана
      на проведение групповых матчей AFC Asian Cup 2031
    </p>
  </div>

  <!-- Bottom info -->
  <div class="bottom-strip">
    <div class="fft-name">Федерация футбола Таджикистана</div>
    <div class="date">Март 2026 &middot; Душанбе</div>
  </div>
</div>
</body>
</html>
