<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1">
<title>Слайд 1 — Вариант 3: Split Composition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500;600;700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --midnight: #06101F;
    --navy: #0B1D3A;
    --panel: #091729;
    --gold: #D7A63D;
    --warm-gold: #EABC50;
    --ivory: #F6F4EF;
    --white: #FFFFFF;
    --muted: rgba(246,244,239,0.55);
  }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--midnight);
  }

  .slide {
    position: relative;
    width: 1920px;
    height: 1080px;
    display: flex;
    overflow: hidden;
  }

  /* Left panel — text */
  .left-panel {
    position: relative;
    width: 780px;
    height: 100%;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 70px 80px 80px;
    z-index: 10;
  }

  /* Subtle gradient on left panel edge */
  .left-panel::after {
    content: '';
    position: absolute;
    top: 0;
    right: -60px;
    width: 60px;
    height: 100%;
    background: linear-gradient(90deg, rgba(9,23,41,0.9), transparent);
    z-index: 12;
  }

  /* Gold vertical accent line */
  .gold-accent-line {
    position: absolute;
    top: 120px;
    left: 0;
    width: 4px;
    height: 0;
    background: linear-gradient(180deg, var(--gold), rgba(215,166,61,0.2));
    animation: lineGrow 1s ease 0.6s both;
  }

  @keyframes lineGrow {
    from { height: 0; }
    to { height: 300px; }
  }

  /* Right panel — image */
  .right-panel {
    position: relative;
    flex: 1;
    height: 100%;
    overflow: hidden;
  }

  .right-panel .bg-image {
    position: absolute;
    inset: 0;
    background: url('../images/aerial-night.jpg') center center / cover no-repeat;
    animation: slowPan 20s ease-in-out infinite alternate;
  }

  @keyframes slowPan {
    from { transform: scale(1.05) translateX(0); }
    to { transform: scale(1.1) translateX(-20px); }
  }

  .right-panel .overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(9,23,41,0.6) 0%, transparent 30%),
      linear-gradient(180deg, rgba(9,23,41,0.3) 0%, transparent 30%, transparent 70%, rgba(9,23,41,0.4) 100%);
  }

  /* AFC logo */
  .afc-logo {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 50px;
    animation: fadeSlideRight 0.7s ease 0.4s both;
  }

  .afc-icon {
    width: 48px;
    height: 48px;
    border: 2px solid rgba(215,166,61,0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .afc-icon svg {
    width: 26px;
    height: 26px;
    fill: var(--gold);
  }

  .afc-label {
    font-family: 'Raleway', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--ivory);
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1.5;
  }

  .afc-label span {
    display: block;
    color: var(--gold);
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 4px;
  }

  /* Title group */
  .pre-title {
    font-family: 'Raleway', sans-serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    animation: fadeSlideRight 0.7s ease 0.7s both;
  }

  .main-title {
    font-family: 'Raleway', sans-serif;
    font-weight: 800;
    font-size: 62px;
    line-height: 1.1;
    color: var(--white);
    margin-bottom: 6px;
    animation: fadeSlideRight 0.8s ease 0.9s both;
  }

  .main-title-accent {
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    font-size: 48px;
    line-height: 1.2;
    color: var(--warm-gold);
    letter-spacing: 2px;
    margin-bottom: 30px;
    animation: fadeSlideRight 0.8s ease 1.1s both;
  }

  .gold-divider {
    width: 60px;
    height: 2px;
    background: var(--gold);
    margin-bottom: 28px;
    animation: fadeSlideRight 0.5s ease 1.3s both;
  }

  .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 17px;
    line-height: 1.75;
    color: var(--muted);
    max-width: 560px;
    animation: fadeSlideRight 0.7s ease 1.5s both;
  }

  /* Bottom elements */
  .bottom-info {
    position: absolute;
    bottom: 50px;
    left: 80px;
    display: flex;
    align-items: center;
    gap: 30px;
    z-index: 20;
    animation: fadeIn 0.8s ease 2s both;
  }

  .fft-block {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .fft-circle {
    width: 38px;
    height: 38px;
    border: 1.5px solid rgba(215,166,61,0.35);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Raleway', sans-serif;
    font-weight: 700;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 1px;
  }

  .fft-text {
    font-size: 11px;
    color: rgba(246,244,239,0.4);
    letter-spacing: 1px;
  }

  .separator {
    width: 1px;
    height: 20px;
    background: rgba(246,244,239,0.15);
  }

  .date-text {
    font-size: 12px;
    color: rgba(215,166,61,0.4);
    letter-spacing: 2px;
  }

  /* Flag strip on image side */
  .flag-overlay {
    position: absolute;
    bottom: 50px;
    right: 60px;
    z-index: 20;
    display: flex;
    gap: 4px;
    animation: fadeIn 1s ease 2s both;
  }

  .flag-strip {
    width: 40px;
    height: 6px;
    border-radius: 3px;
  }

  .fs-red { background: rgba(204,0,0,0.7); }
  .fs-white { background: rgba(255,255,255,0.7); }
  .fs-green { background: rgba(0,102,0,0.7); }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes fadeSlideRight {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>
<div class="slide">
  <!-- Left Panel -->
  <div class="left-panel">
    <div class="gold-accent-line"></div>

    <div class="afc-logo">
      <div class="afc-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      </div>
      <div class="afc-label">
        AFC Asian Cup
        <span>2031</span>
      </div>
    </div>

    <div class="pre-title">Официальная заявка</div>
    <h1 class="main-title">ТАДЖИКИСТАН</h1>
    <div class="main-title-accent">Ваша арена 2031</div>
    <div class="gold-divider"></div>
    <p class="subtitle">
      Заявка Федерации футбола Таджикистана на проведение
      групповых матчей AFC Asian Cup 2031 в городе Душанбе
    </p>

    <!-- Bottom info -->
    <div class="bottom-info">
      <div class="fft-block">
        <div class="fft-circle">ФФТ</div>
        <div class="fft-text">Федерация футбола<br>Таджикистана</div>
      </div>
      <div class="separator"></div>
      <div class="date-text">МАРТ 2026</div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="bg-image"></div>
    <div class="overlay"></div>
    <div class="flag-overlay">
      <div class="flag-strip fs-red"></div>
      <div class="flag-strip fs-white"></div>
      <div class="flag-strip fs-green"></div>
    </div>
  </div>
</div>
</body>
</html>
