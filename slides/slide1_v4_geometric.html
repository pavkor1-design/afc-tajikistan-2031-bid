<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1">
<title>Слайд 1 — Вариант 4: Geometric Modern</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --midnight: #060F1E;
    --deep: #0A1A35;
    --navy: #0F2550;
    --gold: #D7A63D;
    --warm-gold: #EBC25E;
    --ivory: #F6F4EF;
    --white: #FFFFFF;
  }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--midnight);
  }

  .slide {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: linear-gradient(135deg, var(--midnight) 0%, var(--deep) 50%, #081630 100%);
  }

  /* Background image — masked with geometric clip */
  .bg-image-container {
    position: absolute;
    top: 0;
    right: 0;
    width: 1200px;
    height: 100%;
    clip-path: polygon(25% 0, 100% 0, 100% 100%, 0% 100%);
    overflow: hidden;
    animation: fadeIn 1.2s ease 0.3s both;
  }

  .bg-image {
    position: absolute;
    inset: -40px;
    background: url('../ЭРА AFC/04 Стадионы/Душанбе/Landscape/日景鸟瞰.jpg') center center / cover no-repeat;
    animation: slowZoom 22s ease-in-out infinite alternate;
  }

  @keyframes slowZoom {
    from { transform: scale(1); }
    to { transform: scale(1.06); }
  }

  .bg-image-container .overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(6,15,30,0.8) 0%, rgba(6,15,30,0.3) 40%, transparent 70%),
      linear-gradient(180deg, rgba(6,15,30,0.4) 0%, transparent 40%, transparent 60%, rgba(6,15,30,0.5) 100%);
  }

  /* Geometric accent shapes */
  .geo-diamond {
    position: absolute;
    top: 50%;
    left: 680px;
    transform: translate(-50%, -50%) rotate(45deg);
    width: 600px;
    height: 600px;
    border: 1px solid rgba(215,166,61,0.12);
    animation: fadeIn 1.5s ease 0.8s both;
  }

  .geo-diamond-inner {
    position: absolute;
    top: 50%;
    left: 680px;
    transform: translate(-50%, -50%) rotate(45deg);
    width: 400px;
    height: 400px;
    border: 1px solid rgba(215,166,61,0.08);
    animation: fadeIn 1.5s ease 1s both;
  }

  /* Thin gold horizontal lines */
  .h-line-1 {
    position: absolute;
    top: 200px;
    left: 0;
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--gold), transparent);
    animation: lineExpand1 1s ease 0.5s both;
  }

  @keyframes lineExpand1 {
    from { width: 0; }
    to { width: 500px; }
  }

  .h-line-2 {
    position: absolute;
    bottom: 260px;
    left: 0;
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, rgba(215,166,61,0.5), transparent);
    animation: lineExpand2 1s ease 0.7s both;
  }

  @keyframes lineExpand2 {
    from { width: 0; }
    to { width: 350px; }
  }

  /* AFC Logo */
  .afc-logo {
    position: absolute;
    top: 50px;
    left: 80px;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: fadeSlideDown 0.7s ease 0.4s both;
  }

  .afc-hex {
    width: 50px;
    height: 50px;
    background: rgba(10,26,53,0.8);
    border: 2px solid var(--gold);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .afc-hex svg {
    width: 24px;
    height: 24px;
    fill: var(--gold);
  }

  .afc-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--ivory);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    line-height: 1.4;
  }

  .afc-text span {
    display: block;
    color: var(--gold);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 6px;
  }

  /* Flag — top right corner geometric */
  .flag-geo {
    position: absolute;
    top: 0;
    right: 0;
    z-index: 20;
    animation: fadeIn 1s ease 0.5s both;
  }

  .flag-geo svg {
    width: 140px;
    height: 100px;
  }

  /* Main Content — left aligned */
  .content {
    position: absolute;
    top: 50%;
    left: 80px;
    transform: translateY(-50%);
    z-index: 10;
    max-width: 720px;
  }

  .year-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 160px;
    line-height: 0.85;
    color: rgba(215,166,61,0.08);
    letter-spacing: 15px;
    position: absolute;
    top: -100px;
    left: -10px;
    z-index: -1;
    animation: fadeIn 2s ease 0.5s both;
  }

  .pre-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
    padding-left: 2px;
    animation: fadeSlideUp 0.7s ease 0.9s both;
  }

  .main-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 110px;
    line-height: 0.95;
    color: var(--white);
    letter-spacing: 5px;
    margin-bottom: 6px;
    animation: fadeSlideUp 0.8s ease 1.1s both;
  }

  .main-subtitle {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 42px;
    color: var(--warm-gold);
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 30px;
    animation: fadeSlideUp 0.8s ease 1.3s both;
  }

  .desc {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 17px;
    line-height: 1.7;
    color: rgba(246,244,239,0.6);
    max-width: 560px;
    padding-left: 2px;
    animation: fadeSlideUp 0.7s ease 1.6s both;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 50px;
    left: 80px;
    right: 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
    animation: fadeIn 1s ease 2s both;
  }

  .fft-info {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .fft-badge {
    width: 40px;
    height: 40px;
    border: 1.5px solid rgba(215,166,61,0.3);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10,26,53,0.5);
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 1px;
  }

  .fft-name {
    font-size: 11px;
    color: rgba(246,244,239,0.4);
    letter-spacing: 1.5px;
  }

  /* Flag bar bottom center */
  .flag-bar {
    display: flex;
    gap: 3px;
  }

  .flag-bar div {
    width: 30px;
    height: 4px;
    border-radius: 2px;
  }

  .fb-red { background: #CC0000; }
  .fb-white { background: #FFFFFF; }
  .fb-green { background: #006600; }

  .date-info {
    font-size: 12px;
    color: rgba(215,166,61,0.4);
    letter-spacing: 3px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
  }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-15px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="slide">
  <!-- Geometric background image -->
  <div class="bg-image-container">
    <div class="bg-image"></div>
    <div class="overlay"></div>
  </div>

  <!-- Geometric accents -->
  <div class="geo-diamond"></div>
  <div class="geo-diamond-inner"></div>
  <div class="h-line-1"></div>
  <div class="h-line-2"></div>

  <!-- AFC Logo -->
  <div class="afc-logo">
    <div class="afc-hex">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
    </div>
    <div class="afc-text">
      AFC Asian Cup
      <span>2031</span>
    </div>
  </div>

  <!-- Flag geometric corner -->
  <div class="flag-geo">
    <svg viewBox="0 0 140 100" fill="none">
      <polygon points="40,0 140,0 140,80" fill="#CC0000" opacity="0.25"/>
      <polygon points="60,0 140,0 140,60" fill="#FFFFFF" opacity="0.2"/>
      <polygon points="80,0 140,0 140,40" fill="#006600" opacity="0.25"/>
    </svg>
  </div>

  <!-- Main Content -->
  <div class="content">
    <div class="year-big">2031</div>
    <div class="pre-title">Официальная заявка</div>
    <h1 class="main-title">ТАДЖИКИСТАН</h1>
    <div class="main-subtitle">Ваша арена 2031</div>
    <p class="desc">
      Официальная заявка Федерации футбола Таджикистана
      на проведение групповых матчей Кубка Азии AFC 2031
    </p>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <div class="fft-info">
      <div class="fft-badge">ФФТ</div>
      <div class="fft-name">Федерация футбола Таджикистана</div>
    </div>
    <div class="flag-bar">
      <div class="fb-red"></div>
      <div class="fb-white"></div>
      <div class="fb-green"></div>
    </div>
    <div class="date-info">МАРТ 2026</div>
  </div>
</div>
</body>
</html>
